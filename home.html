<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 Умный Глоссарий</title>

    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/style.css" />

    <link rel="icon" href="img/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="img/code-dict.ico" />
    <!-- Подключение библиотеки XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Конвертер Excel в JSON</h1>

      <div class="upload-section">
        <input type="file" id="excelFile" accept=".xlsx, .xls" />
        <button onclick="convertExcelToJson()">Конвертировать</button>
      </div>

      <div id="output"></div>

      <script>
        function convertExcelToJson() {
          const fileInput = document.getElementById("excelFile");
          const outputDiv = document.getElementById("output");

          if (!fileInput.files.length) {
            alert("Пожалуйста, выберите Excel‑файл");
            return;
          }

          const file = fileInput.files[0];
          const reader = new FileReader();

          reader.onload = function (e) {
            try {
              const data = new Uint8Array(e.target.result);
              const workbook = XLSX.read(data, { type: "array" });
              const worksheet = workbook.Sheets[workbook.SheetNames[0]];

              // Конвертируем в JSON. Библиотека сама создаст объекты с ключами из шапки Excel
              const jsonData = XLSX.utils.sheet_to_json(worksheet, {
                defval: "", // Если ячейка пустая, будет пустая строка
                raw: false, // Читать значения как строки (сохраняет форматирование)
              });

              if (jsonData.length > 0) {
                // Проверка: выведем список найденных полей в консоль для контроля
                console.log("Найденные поля:", Object.keys(jsonData[0]));

                outputDiv.innerHTML = `
                    <h3>Готово! Найдено записей: ${jsonData.length}</h3>
                    <p style="font-size: 0.9em; color: gray;">Поля: ${Object.keys(jsonData[0]).join(", ")}</p>
                    <pre id="jsonPre"></pre>
                    <button id="dlBtn" class="theme-btn">Скачать data-dict.js</button>
                `;

                document.getElementById("jsonPre").textContent =
                  JSON.stringify(jsonData.slice(0, 3), null, 2) +
                  "\n... и остальные записи";

                window.jsonDataToDownload = jsonData;
                document.getElementById("dlBtn").onclick = downloadJsFile;
              } else {
                outputDiv.innerHTML = "<p>Файл пуст</p>";
              }
            } catch (error) {
              outputDiv.innerHTML = `<p style="color: red;">Ошибка: ${error.message}</p>`;
            }
          };
          reader.readAsArrayBuffer(file);
        }

        function downloadJsFile() {
          if (!window.jsonDataToDownload) return;

          const dataString = JSON.stringify(window.jsonDataToDownload, null, 2);
          // Формируем финальный JS-файл
          const fileContent = `export const glossaryDataRaw = ${dataString};`;

          const blob = new Blob([fileContent], {
            type: "application/javascript",
          });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "data-dict.js";
          a.click();
          URL.revokeObjectURL(url);
        }
      </script>
    </div>
  </body>
</html>
