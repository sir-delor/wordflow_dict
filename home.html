  <body>
  
  <header>
    <div class="container">

    </div>
	
	      <button id="theme-toggle" class="theme-btn">🌙</button>
</header>

    <div class="container">
      <h1>Конвертер Excel в JSON</h1>

      <div class="upload-section">
        <input type="file" id="excelFile" accept=".xlsx, .xls" />
        <button onclick="convertExcelToJson()">Конвертировать</button>
      </div>

      <div id="output"></div>
	      </div>

	  <a href="home.html" class="footer-link">Обслуживание словаря</a>

	    <script type="module" src="js/theme-script.js"></script>
		
      <script>
function convertExcelToJson() {
    const fileInput = document.getElementById("excelFile");
    const outputDiv = document.getElementById("output");

    if (!fileInput.files.length) {
        alert("Пожалуйста, выберите Excel‑файл");
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function (e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: "array" });
            
            outputDiv.innerHTML = "<h3>Результаты обработки:</h3>";

            // Перебираем все листы в книге
            workbook.SheetNames.forEach((sheetName) => {
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, {
                    defval: "",
                    raw: false,
                });

                if (jsonData.length > 0) {
                    // Формируем имя файла на основе названия листа (приводим к нижнему регистру)
                    const fileName = `dict-data-${sheetName.toLowerCase()}.js`;
                    
                    // Создаем контейнер для каждого листа
                    const section = document.createElement("div");
                    section.style.marginBottom = "20px";
                    section.innerHTML = `
                        <strong>Лист: ${sheetName}</strong> (записей: ${jsonData.length})<br>
                        <button class="theme-btn" onclick="downloadSingleFile('${fileName}', ${JSON.stringify(jsonData).replace(/"/g, '&quot;')})">
                            Скачать ${fileName}
                        </button>
                    `;
                    outputDiv.appendChild(section);
                }
            });

        } catch (error) {
            outputDiv.innerHTML = `<p style="color: red;">Ошибка: ${error.message}</p>`;
            console.error(error);
        }
    };
    reader.readAsArrayBuffer(file);
}

// Универсальная функция для скачивания конкретного файла
function downloadSingleFile(fileName, data) {
    const dataString = JSON.stringify(data, null, 2);
    
    // Определяем имя переменной (например: htmlData, cssData, mysqlData)
    // Убираем "dict-data-" и ".js", оставляя только суть
    const varName = fileName.replace('dict-data-', '').replace('.js', '') + 'Data';
    
    // Теперь внутри файла будет: export const mysqlData = [...]
    const fileContent = `export const ${varName} = ${dataString};`;
    
    const blob = new Blob([fileContent], { type: "application/javascript" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
}

      </script>

  </body>
