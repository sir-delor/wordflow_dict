<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 Умный Глоссарий</title>

    <link rel="stylesheet" type="text/css" href="fonts/fonts.css" />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/style.css" />

    <link rel="icon" href="img/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="img/code-dict.ico" />
  </head>
  <body>
    <h1>📚 HTML@Dict</h1>

    <div class="controls">
      <div class="search-wrapper">
        <input
          type="text"
          id="search"
          placeholder="Поиск термина или определения..."
        />
        <button id="theme-toggle" class="theme-btn">🌙 Тёмная тема</button>
      </div>

      <div id="tech-filter" class="tech-filters"></div>
      <!-- Добавлен класс для стилей -->
      <div class="alphabet" id="alphabet"></div>

      <div id="stats" class="stats">Загрузка...</div>
    </div>

    <!-- Основной контейнер для карточек (оставили один) -->
    <div id="glossary" class="container">Ожидание данных...</div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="js/modal.js"></script>
    <script type="module" src="js/dict-script.js"></script>
    <script type="module" src="js/theme-script.js"></script>
  </body>
</html>
