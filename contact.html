<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Умный Глоссарий</title>
  
  <link rel="stylesheet" type="text/css" href="fonts/fonts.css" />
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/style.css" />
  
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="img/favicon.ico" type="image/x-icon" />

  <style>

.contact-container {
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    font-family: sans-serif;
    color: #333;
}

.contact-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.form-group label {
    font-weight: bold;
    font-size: 14px;
}

.form-group input, .form-group textarea {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
}

.submit-btn {
    background-color: #000; /* Черный стиль Sir Delor */
    color: white;
    padding: 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.3s;
}

.submit-btn:hover {
    background-color: #333;
}

.privacy-note {
    font-size: 12px;
    color: #777;
    text-align: center;
}


  </style>
</head>

  <body>

  <header>
    <div class="container">
    <h1>📚 HTML@Dict</h1>
    </div>
	
	      <button id="theme-toggle" class="theme-btn">🌙</button>
</header>
	  
	  
	 <div class="contact-container">
    <h2>Связаться с нами</h2>
    <p>Напишите нам, и мы ответим в течение рабочего дня. <br> 
       Наша почта: <a href="mailto:i@sir-delor.ru">i@sir-delor.ru</a></p>

    <!-- В поле action указывается обработчик Wordflow или сервис вроде Formspree -->
    <form action="mailto:i@sir-delor.ru" method="post" enctype="text/plain" class="contact-form">
        <div class="form-group">
            <label for="name">Как к вам обращаться?</label>
            <input type="text" id="name" name="name" placeholder="Иван Иванов" required>
        </div>

        <div class="form-group">
            <label for="email">Ваш адрес для ответа</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label for="message">Чем мы можем вам помочь?</label>
            <textarea id="message" name="message" rows="5" placeholder="Введите ваше сообщение..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Связаться с Sir Delor</button>
        
        <p class="privacy-note">Нажимая кнопку, вы соглашаетесь с политикой конфиденциальности.</p>
    </form>
</div>
 
	  

		<footer class="main-footer">
  <div class="footer-container">
    <div class="footer-info">
      <span class="footer-logo">HTML@Dict</span>
      <p class="copyright">&copy; 2026 Умный Глоссарий. Все права защищены.</p>
    </div>
    
    <nav class="footer-nav">
      <a href="index.html" class="footer-link">Главная</a>
	  <a href="home.html" class="footer-link">Обслуживание словаря</a>
      <a href="about.html" class="footer-link">О проекте</a>
      <a href="contact.html" class="footer-link">Контакты</a>
    </nav>
  </div>
</footer>

    <script type="module" src="js/theme-script.js"></script>
	
  </body>
</html>
